name: Build FDO Version

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-fdo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build FDO version
        run: dotnet publish -c Release -o publish/fdo --no-restore
      - name: Upload FDO artifact
        uses: actions/upload-artifact@v4
        with:
          name: shenmeji-fdo
          path: publish/fdo
